<!DOCTYPE HTML>
<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Joshu — Choose new password</title>
    <link rel="stylesheet" href="script/semantic/semantic.min.css">
    <link rel="stylesheet" href="script/ao.css">
    <link rel="stylesheet" href="script/joshu-auth-pages.css?v={{joshu_overlay_version}}">
    <script type="application/javascript" src="script/jquery.min.js"></script>
    <script type="application/javascript" src="script/semantic/semantic.min.js"></script>
    </head>
    <body class="jp-user-setup">
    <br><br><br>
    <div class="ui container" align="center">
        <div class="ui basic segment" style="max-width:440px;" align="left">
            <div class="imageRight" align="center">
                <img class="ui small image loginLogo" src="img/public/joshu-wordmark.svg" alt="Joshu">
            </div>
            <div class="ui divider"></div>
            <div class="ui text container">
                <p>Choose a new password for <strong>{{username}}</strong> on <strong>{{host_name}}</strong></p>
            </div>
            <div class="ui divider"></div>
            <form class="ui form" onsubmit="handleFormSubmit(event, this);">
                <div class="disabled field">
                    <label>Username</label>
                    <input type="text" name="username" value="{{username}}" readonly=true>
                </div>
                <div class="ui divider"></div>
                <div class="field">
                    <label>New password</label>
                    <input id="npw" type="password" name="newpw" placeholder="New password" autocomplete="new-password">
                </div>
                <div class="field">
                    <label>Confirm new password</label>
                    <input id="cpw" type="password" name="confirmnewpw" placeholder="Confirm new password" autocomplete="new-password">
                </div>
                <button id="submitbtn" class="ui green button" type="submit">Update password</button>
            </form>
            <div id="errmsg" class="ui red inverted segment" style="display:none;">
                <i class="remove icon"></i> <span id="errtext">Internal Server Error</span>
            </div>
            <br>
            <p>Back to <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <script>
       var username = "{{username}}";
       var resetPasswordKey = "{{rkey}}";

       function handleFormSubmit(evt,obj){
        evt.preventDefault();
            var newpw = obj.newpw.value;
            var cpw = obj.confirmnewpw.value;
            $("#npw").parent().removeClass("error");
            $("#cpw").parent().removeClass("error");

            if (newpw != cpw){
                showErrorMessage("Confirm password does not match.")
                $("#cpw").parent().addClass("error");
                return
            }

            if (newpw == "" || cpw == ""){
                showErrorMessage("Password cannot be empty")
                $("#npw").parent().addClass("error");
                return
            }

            $.ajax({
                url: "system/reset/confirmPasswordReset",
                method: "POST",
                data: {username: username, rkey: resetPasswordKey, pw: newpw},
                success: function(data){
                    if (data.error !== undefined){
                        showErrorMessage(data.error);
                    }else{
                        window.location.href = "login.html";
                    }
                }
            })
       }

       function showErrorMessage(msg){
            $("#errtext").text(msg);
            $("#errmsg").stop().finish().slideDown("fast");
       }
    </script>
    </body>
</html>
