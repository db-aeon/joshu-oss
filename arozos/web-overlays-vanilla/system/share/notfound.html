<!DOCTYPE HTML>
<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{{hostname}} File Share</title>
    <!-- joshu-share-notfound: Joshu-owned copy — no stock notfound artwork; Joshu footer -->
    <link rel="stylesheet" href="../../script/skeleton/offline.css">
    <link rel="stylesheet" href="../../script/skeleton/normalize.css">
    <link rel="stylesheet" href="../../script/skeleton/skeleton.css">
    <script type="application/javascript" src="../../script/jquery.min.js"></script>
    <style>
        .bar{
            height: 12px;
            background-color: #1a1a1a;
            width: 100%;
        }

        .footer{
            position: fixed;
            left: 0px;
            bottom: 0px;
            height: 50px;
            width: 100%;
            background-color: #1a1a1a;
            padding: 20px;
            color: white;
        }
    </style>
    </head>
    <body>
        <div class="bar"></div>
        <br>
        <div class="container" style="padding-bottom: 120px;">
            <div class="row">
                <div class="twelve columns">
                    <h5>{{hostname}} File Sharing</h5>
                    <h3>File Not Found</h3>
                    <p>This share link is no longer valid. The file may have been removed, or sharing may have been turned off.</p>
                    <p>Request File ID: {{reqid}}<br>
                    Request Timestamp: {{reqtime}}</p>
                </div>
            </div>
        </div>
        <div class="footer">
            <div class="container">
                File sharing by <a style="color: white;" href="https://joshu.me" target="_blank" rel="noopener noreferrer">Joshu</a>
            </div>
        </div>
    </body>
</html>
