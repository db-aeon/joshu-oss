name: joshu-oss-image

on:
  push:
    tags: ["v*-oss", "v1.0.0-oss"]
  workflow_dispatch:
    inputs:
      images:
        description: Which images to build and push
        required: false
        default: all
        type: choice
        options:
          - all
          - voice-only

# contents: write is required to create the GitHub Release for each tag.
permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure vendor trees (OSS snapshot omits vendor/)
        if: inputs.images != 'voice-only'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ensure-vendor-for-build.sh

      - uses: actions/setup-node@v4
        if: inputs.images != 'voice-only'
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
        if: inputs.images != 'voice-only'
      - run: npm run check:oss-boundaries
        if: inputs.images != 'voice-only'
      - run: npm run build:deploy
        if: inputs.images != 'voice-only'
      - run: npm run vps:sync-hermes-pin
        if: inputs.images != 'voice-only'
      - run: npm run vps:sync-camofox-pin
        if: inputs.images != 'voice-only'

      - name: Resolve Hermes pin
        id: hermes
        if: inputs.images != 'voice-only'
        run: echo "ref=$(node scripts/sync-vps-hermes-pin.mjs --print)" >> "$GITHUB_OUTPUT"

      - name: Resolve Camofox pin
        id: camofox
        if: inputs.images != 'voice-only'
        run: echo "ref=$(node scripts/sync-vps-camofox-pin.mjs --print)" >> "$GITHUB_OUTPUT"

      - name: Resolve gbrain pin
        id: gbrain
        if: inputs.images != 'voice-only'
        run: |
          echo "ref=$(node -e "console.log(JSON.parse(require('fs').readFileSync('deploy/RELEASE.json','utf8')).gbrainRef)")" >> "$GITHUB_OUTPUT"

      - name: Resolve release version
        id: release
        run: |
          echo "version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('deploy/RELEASE.json','utf8')).version)")" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push joshu-oss (Vanilla theme)
        if: inputs.images != 'voice-only'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          build-args: |
            HERMES_AGENT_REF=${{ steps.hermes.outputs.ref }}
            CAMOFOX_BASE=${{ steps.camofox.outputs.ref }}
            GBRAIN_REF=${{ steps.gbrain.outputs.ref }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/joshu-oss:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/joshu-oss:${{ steps.release.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/joshu-oss:latest

      - name: Build and push joshu-oss-voice-realtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.voice-realtime
          push: true
          build-args: |
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/joshu-oss-voice-realtime:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/joshu-oss-voice-realtime:${{ steps.release.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/joshu-oss-voice-realtime:latest

      - name: Make GHCR packages public (self-host pull without login)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in joshu-oss joshu-oss-voice-realtime; do
            gh api --method PATCH "/users/${{ github.repository_owner }}/packages/container/${pkg}" \
              -f visibility=public \
              || echo "[ghcr] visibility unchanged for ${pkg} (may need manual publish settings)"
          done

      # Publish a GitHub Release so the repo sidebar / releases page shows the
      # current Docker version. Custom body (RELEASE.json notes + image pins) is
      # prepended; generate_release_notes appends the PR/commit diff since the
      # previous tag (GitHub's auto-changelog).
      - name: Compose release notes from RELEASE.json
        id: notes
        if: github.ref_type == 'tag'
        run: |
          node -e '
            const r = JSON.parse(require("fs").readFileSync("deploy/RELEASE.json", "utf8"));
            const owner = process.env.GITHUB_REPOSITORY_OWNER;
            const body = [
              r.notes ? `${r.notes}\n` : "",
              "## Docker images",
              "",
              "```",
              `ghcr.io/${owner}/joshu-oss:${r.version}`,
              `ghcr.io/${owner}/joshu-oss-voice-realtime:${r.version}`,
              "```",
              "",
              "## Pins",
              "",
              `| Component | Ref |`,
              `|-----------|-----|`,
              `| Hermes | \`${r.hermesRef}\` |`,
              `| gbrain | \`${r.gbrainRef}\` |`,
              `| Camofox base | \`${r.camofoxBase}\` |`,
              "",
            ].join("\n");
            require("fs").writeFileSync("release-notes.md", body);
          '

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release.outputs.version }}
          body_path: release-notes.md
          generate_release_notes: true
          make_latest: true
