<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Chat with {{DISPLAY_NAME}}</title>
  <link rel="icon" href="/img/public/joshu-icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="{{ASSET_BASE}}/share-chat/assets/joshu-public-pages.css" />
</head>
<body class="jp-public">
  <div class="jp-public-shell jp-public-shell-tall">
    <main class="jp-public-panel jp-public-panel-chat">
      <header class="jp-chat-top">
        <div class="jp-brandbar">
          <img class="jp-mark" src="/img/public/joshu-wordmark.svg" alt="joshu" />
          <!-- Signature-style identity lockup (portrait + name + {owner}'s Joshu) -->
          <div class="jp-identity" role="group" aria-label="{{ASSISTANT_NAME}}">
            <div class="jp-identity-photo">{{IDENTITY_PHOTO_HTML}}</div>
            <div class="jp-identity-copy">
              <p class="jp-identity-name">{{ASSISTANT_NAME}}</p>
              <p class="jp-identity-role">{{ROLE_LINE}}</p>
            </div>
          </div>
        </div>
        <h1 class="jp-public-title jp-chat-subject">Chat with {{DISPLAY_NAME}}</h1>
        <p class="jp-chat-meta">Shared {{IS_FOLDER}}</p>
      </header>
      <div class="jp-chat-messages" id="messages" aria-live="polite"></div>
      <form class="jp-chat-composer" id="composer">
        <textarea id="input" rows="2" placeholder="Ask a question about these files…" maxlength="4000" required></textarea>
        <button type="submit" class="jp-public-btn jp-public-btn-primary" id="send">Send</button>
      </form>
    </main>
    <footer class="jp-public-footer">
      <strong>Joshu</strong> · File chat by <a href="https://joshu.me" target="_blank" rel="noopener noreferrer">joshu.me</a>
    </footer>
  </div>

  <script>
    const SHARE_UUID = "{{SHARE_UUID}}";
    const ASSISTANT_NAME = "{{ASSISTANT_NAME}}";
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("composer");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function apiBase() {
      const m = location.pathname.match(/^(.*?)\/share-chat\//);
      return (m && m[1]) || "";
    }

    // --- Minimal, dependency-free markdown renderer (escape-first, XSS-safe) ---
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderInline(text) {
      let out = escapeHtml(text);
      // inline code first so other rules don't touch its contents
      out = out.replace(/`([^`\n]+)`/g, (m, code) => "<code>" + code + "</code>");
      out = out.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
      out = out.replace(/__([^_\n]+)__/g, "<strong>$1</strong>");
      out = out.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,;:!?]|$)/g, "$1<em>$2</em>");
      out = out.replace(/(^|[\s(])_([^_\n]+)_(?=[\s).,;:!?]|$)/g, "$1<em>$2</em>");
      // [label](http…) links — only http/https, open in new tab
      out = out.replace(
        /\[([^\]\n]+)\]\((https?:\/\/[^\s)]+)\)/g,
        '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>'
      );
      return out;
    }

    function renderMarkdown(text) {
      const lines = String(text || "").replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let i = 0;
      let para = [];
      const flushPara = () => {
        if (para.length) {
          html.push("<p>" + para.map(renderInline).join("<br>") + "</p>");
          para = [];
        }
      };
      while (i < lines.length) {
        const line = lines[i];
        // fenced code block
        const fence = line.match(/^```/);
        if (fence) {
          flushPara();
          const code = [];
          i++;
          while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
          i++; // skip closing fence (or EOF)
          html.push("<pre><code>" + escapeHtml(code.join("\n")) + "</code></pre>");
          continue;
        }
        // heading
        const h = line.match(/^(#{1,4})\s+(.*)$/);
        if (h) {
          flushPara();
          const level = h[1].length;
          html.push("<h" + level + ">" + renderInline(h[2]) + "</h" + level + ">");
          i++;
          continue;
        }
        // horizontal rule
        if (/^(?:-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
          flushPara();
          html.push("<hr>");
          i++;
          continue;
        }
        // blockquote
        if (/^>\s?/.test(line)) {
          flushPara();
          const quote = [];
          while (i < lines.length && /^>\s?/.test(lines[i])) {
            quote.push(lines[i].replace(/^>\s?/, ""));
            i++;
          }
          html.push("<blockquote>" + renderMarkdown(quote.join("\n")) + "</blockquote>");
          continue;
        }
        // unordered / ordered list
        const ul = /^\s*[-*+]\s+/.test(line);
        const ol = /^\s*\d+[.)]\s+/.test(line);
        if (ul || ol) {
          flushPara();
          const tag = ul ? "ul" : "ol";
          const pattern = ul ? /^\s*[-*+]\s+/ : /^\s*\d+[.)]\s+/;
          const items = [];
          while (i < lines.length && pattern.test(lines[i])) {
            items.push("<li>" + renderInline(lines[i].replace(pattern, "")) + "</li>");
            i++;
          }
          html.push("<" + tag + ">" + items.join("") + "</" + tag + ">");
          continue;
        }
        // simple pipe table (header + |---| separator)
        if (/^\s*\|.*\|\s*$/.test(line) && i + 1 < lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i + 1])) {
          flushPara();
          const cells = (row) => row.trim().replace(/^\||\|$/g, "").split("|").map((c) => renderInline(c.trim()));
          const head = cells(line);
          i += 2;
          const rows = [];
          while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) {
            rows.push(cells(lines[i]));
            i++;
          }
          html.push(
            "<table><thead><tr>" + head.map((c) => "<th>" + c + "</th>").join("") + "</tr></thead>" +
            "<tbody>" + rows.map((r) => "<tr>" + r.map((c) => "<td>" + c + "</td>").join("") + "</tr>").join("") + "</tbody></table>"
          );
          continue;
        }
        // blank line ends the paragraph
        if (!line.trim()) {
          flushPara();
          i++;
          continue;
        }
        para.push(line);
        i++;
      }
      flushPara();
      return html.join("\n");
    }

    function addMessage(role, text, citations) {
      const wrap = document.createElement("div");
      wrap.className = "jp-chat-msg " + (role === "user" ? "user" : "bot");
      const who = document.createElement("div");
      who.className = "who";
      who.textContent = role === "user" ? "You" : ASSISTANT_NAME;
      const body = document.createElement("div");
      body.className = "body";
      if (role === "user") {
        body.textContent = text;
      } else {
        body.innerHTML = renderMarkdown(text);
      }
      wrap.appendChild(who);
      wrap.appendChild(body);
      if (citations && citations.length) {
        appendCitations(wrap, citations);
      }
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    function appendCitations(wrap, citations) {
      const existing = wrap.querySelector(".jp-chat-citations");
      if (existing) existing.remove();
      if (!citations || !citations.length) return;
      const row = document.createElement("div");
      row.className = "jp-chat-citations";
      for (const c of citations) {
        const chip = document.createElement("span");
        chip.className = "jp-chat-chip";
        chip.textContent = c.title || c.slug;
        row.appendChild(chip);
      }
      wrap.appendChild(row);
    }

    function startBotStream() {
      const wrap = document.createElement("div");
      wrap.className = "jp-chat-msg bot streaming";
      const who = document.createElement("div");
      who.className = "who";
      who.textContent = ASSISTANT_NAME;
      const status = document.createElement("div");
      status.className = "status";
      status.textContent = "Starting…";
      const body = document.createElement("div");
      body.className = "body";
      body.textContent = "";
      wrap.appendChild(who);
      wrap.appendChild(status);
      wrap.appendChild(body);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      // Accumulate raw markdown; re-render on each delta so formatting appears live.
      let raw = "";
      return {
        wrap,
        status,
        body,
        get raw() { return raw; },
        setStatus(text) {
          status.hidden = !text;
          status.textContent = text || "";
          messagesEl.scrollTop = messagesEl.scrollHeight;
        },
        append(text) {
          raw += text;
          body.innerHTML = renderMarkdown(raw);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        },
        setFinal(text, citations) {
          wrap.classList.remove("streaming");
          status.hidden = true;
          if (typeof text === "string" && text.length) raw = text;
          body.innerHTML = renderMarkdown(raw);
          appendCitations(wrap, citations || []);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        },
        fail(text) {
          wrap.classList.remove("streaming");
          status.hidden = true;
          body.textContent = text;
        },
      };
    }

    async function readSseStream(res, handlers) {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split("\n\n");
        buffer = parts.pop() || "";
        for (const part of parts) {
          let event = "message";
          let data = "";
          for (const line of part.split("\n")) {
            if (line.startsWith("event:")) event = line.slice(6).trim();
            else if (line.startsWith("data:")) data += line.slice(5).trim();
          }
          if (!data) continue;
          let parsed;
          try { parsed = JSON.parse(data); } catch { continue; }
          handlers(event, parsed);
        }
      }
    }

    addMessage(
      "bot",
      "Ask me anything about the shared files.",
      []
    );

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = (input.value || "").trim();
      if (!text) return;
      addMessage("user", text, []);
      input.value = "";
      sendBtn.disabled = true;
      const stream = startBotStream();
      try {
        const res = await fetch(
          apiBase() + "/api/share-chat/" + encodeURIComponent(SHARE_UUID) + "/message?stream=1",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "text/event-stream",
            },
            body: JSON.stringify({ message: text }),
          }
        );
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          stream.fail(
            data.error === "rate_limited"
              ? "Too many questions — please wait a moment."
              : (data.error || "Something went wrong.")
          );
          return;
        }
        // Non-SSE fallback (proxy stripped stream)
        const ctype = res.headers.get("content-type") || "";
        if (!ctype.includes("text/event-stream")) {
          const data = await res.json().catch(() => ({}));
          stream.setFinal(data.answer || "(empty answer)", data.citations || []);
          return;
        }

        let finished = false;
        await readSseStream(res, (event, data) => {
          if (event === "status") {
            stream.setStatus(data.message || data.phase || "Working…");
          } else if (event === "evidence") {
            if (data.count > 0) {
              stream.setStatus(
                "Found " + data.count + " passage" + (data.count === 1 ? "" : "s") +
                (data.titles && data.titles.length ? " in " + data.titles.slice(0, 3).join(", ") : "") +
                "…"
              );
            }
          } else if (event === "delta") {
            stream.setStatus("");
            stream.append(data.text || "");
          } else if (event === "done") {
            finished = true;
            stream.setFinal(data.answer || "", data.citations || []);
          } else if (event === "error") {
            finished = true;
            stream.fail(data.error || "Something went wrong.");
          }
        });
        if (!finished && !stream.raw) {
          stream.fail("No answer returned.");
        } else if (!finished) {
          stream.setFinal(stream.raw, []);
        }
      } catch (err) {
        stream.fail("Network error — could not reach share chat.");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });
  </script>
</body>
</html>
