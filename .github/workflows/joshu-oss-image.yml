name: joshu-oss-image

on:
  push:
    tags: ["v*-oss", "v1.0.0-oss"]
  workflow_dispatch:
    inputs:
      images:
        description: Which images to build and push
        required: false
        default: all
        type: choice
        options:
          - all
          - voice-only

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure vendor trees (OSS snapshot omits vendor/)
        if: inputs.images != 'voice-only'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ensure-vendor-for-build.sh

      - uses: actions/setup-node@v4
        if: inputs.images != 'voice-only'
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
        if: inputs.images != 'voice-only'
      - run: npm run check:oss-boundaries
        if: inputs.images != 'voice-only'
      - run: npm run build:deploy
        if: inputs.images != 'voice-only'
      - run: npm run vps:sync-hermes-pin
        if: inputs.images != 'voice-only'
      - run: npm run vps:sync-camofox-pin
        if: inputs.images != 'voice-only'

      - name: Resolve Hermes pin
        id: hermes
        if: inputs.images != 'voice-only'
        run: echo "ref=$(node scripts/sync-vps-hermes-pin.mjs --print)" >> "$GITHUB_OUTPUT"

      - name: Resolve Camofox pin
        id: camofox
        if: inputs.images != 'voice-only'
        run: echo "ref=$(node scripts/sync-vps-camofox-pin.mjs --print)" >> "$GITHUB_OUTPUT"

      - name: Resolve gbrain pin
        id: gbrain
        if: inputs.images != 'voice-only'
        run: |
          echo "ref=$(node -e "console.log(JSON.parse(require('fs').readFileSync('deploy/RELEASE.json','utf8')).gbrainRef)")" >> "$GITHUB_OUTPUT"

      - name: Resolve release version
        id: release
        run: |
          echo "version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('deploy/RELEASE.json','utf8')).version)")" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push joshu-oss (Vanilla theme)
        if: inputs.images != 'voice-only'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          build-args: |
            HERMES_AGENT_REF=${{ steps.hermes.outputs.ref }}
            CAMOFOX_BASE=${{ steps.camofox.outputs.ref }}
            GBRAIN_REF=${{ steps.gbrain.outputs.ref }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/joshu-oss:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/joshu-oss:${{ steps.release.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/joshu-oss:latest

      - name: Build and push joshu-oss-voice-realtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.voice-realtime
          push: true
          build-args: |
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/joshu-oss-voice-realtime:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/joshu-oss-voice-realtime:${{ steps.release.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/joshu-oss-voice-realtime:latest

      - name: Make GHCR packages public (self-host pull without login)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in joshu-oss joshu-oss-voice-realtime; do
            gh api --method PATCH "/users/${{ github.repository_owner }}/packages/container/${pkg}" \
              -f visibility=public \
              || echo "[ghcr] visibility unchanged for ${pkg} (may need manual publish settings)"
          done
